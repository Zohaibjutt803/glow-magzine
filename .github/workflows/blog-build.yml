name: Build blog from Contentful

# Fires when Contentful publishes/unpublishes an entry (via repository_dispatch),
# or manually from the Actions tab. Rebuilds the static site with fresh blog
# content and commits the generated output so Vercel auto-deploys it.
#
# Required repo secrets (Settings -> Secrets and variables -> Actions):
#   CONTENTFUL_SPACE_ID
#   CONTENTFUL_CDA_TOKEN
# Optional: CONTENTFUL_ENVIRONMENT (defaults to "master")

on:
  repository_dispatch:
    types: [contentful_publish]
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: blog-build
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Build site from Contentful
        env:
          CONTENTFUL_SPACE_ID: ${{ secrets.CONTENTFUL_SPACE_ID }}
          CONTENTFUL_CDA_TOKEN: ${{ secrets.CONTENTFUL_CDA_TOKEN }}
          CONTENTFUL_ENVIRONMENT: ${{ secrets.CONTENTFUL_ENVIRONMENT || 'master' }}
        run: node build.mjs

      - name: Commit and push generated output
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          if git diff --cached --quiet; then
            echo "No content changes — nothing to deploy."
          else
            git commit -m "chore(blog): rebuild from Contentful [skip ci]"
            git push
          fi
