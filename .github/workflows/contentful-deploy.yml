name: Deploy on Contentful publish

# Auto-deploy when Contentful publishes
#
# RECOMMENDED — Vercel Deploy Hook (no GitHub PAT needed):
#   1. Vercel → glow-magzine → Settings → Git → Deploy Hooks
#      Hook "contentful-publish" on branch main (already created)
#   2. Contentful → Settings → Webhooks → Add:
#      URL:    <paste Deploy Hook URL from Vercel>
#      Method: POST
#      Triggers: Entry → Publish, Unpublish
#      (No custom headers or body required)
#
# ALTERNATIVE — GitHub Actions (requires PAT + custom body):
#   Secrets: VERCEL_TOKEN, VERCEL_ORG_ID, VERCEL_PROJECT_ID
#   Contentful cannot send repository_dispatch JSON by default — use Deploy Hook instead.

on:
  repository_dispatch:
    types: [contentful_publish]
  workflow_dispatch:

concurrency:
  group: contentful-deploy
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Deploy to Vercel production
        env:
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
        run: |
          npx vercel@latest deploy --prod --yes --token="$VERCEL_TOKEN"
